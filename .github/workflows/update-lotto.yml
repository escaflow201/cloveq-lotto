name: Update Lotto Data

on:
  schedule:
    - cron: '0 3 * * 6'  # 토요일 낮 12시 (한국)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Node 설치
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 패키지 설치
        run: npm install node-fetch@2

      - name: 데이터 업데이트
        run: node scripts/update-lotto.js

      - name: 커밋 & 푸시
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add lotto_recent_year.json
          git commit -m "자동 업데이트" || echo "변경 없음"
          git push
