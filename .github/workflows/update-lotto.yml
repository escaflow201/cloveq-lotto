name: Update Lotto JSON

on:
  workflow_dispatch:
  schedule:
    - cron: '17 12 * * 6'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 로또 JSON 업데이트
        run: node scripts/update-lotto.js

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lotto_recent_year.json
          git diff --cached --quiet || git commit -m "자동 회차 업데이트"
          git push
