name: Update Lotto JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 6"

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 스크립트 실행
        run: node scripts/update-lotto.js

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lotto_recent_year.json
          git diff --cached --quiet || git commit -m "자동 업데이트"
          git push
