name: Lotto Recent Year Update

on:
  schedule:
    - cron: '30 2 * * *'        # 매일 새벽 2시 30분 (한국시간 기준으로는 3시 30분)
  workflow_dispatch:            # 수동으로도 실행 가능

jobs:
  update-lotto:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repository 체크아웃
        uses: actions/checkout@v4
      
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 필요한 패키지 설치
        run: pip install requests
      
      - name: lotto_recent_year.json 업데이트
        run: python update_lotto.py
      
      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lotto_recent_year.json
          git commit -m "🔄 Update lotto_recent_year.json - $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
